# 簿記 新出用語集（3級になかった概念をためる）

学習中に出会った「初めて」の用語をここに追加していく。

---

## 現金として扱うもの（第2章）

通貨（お札・硬貨）以外に、**すぐお金に換えられる券**も「現金」として処理する（通貨代用証券）。

- 他人振出の小切手
- 送金小切手・郵便為替証書
- 配当金領収証
- **期限到来後の公社債利札**（国債・社債などの利息クーポンで、支払期限が来たもの）

**有価証券利息（収益）** … 国債・社債などから受け取る利息の科目。

例：国債の利札 ¥40 の支払期限が到来した（新たに計上）
```
（借）現金 40 ／（貸）有価証券利息 40
```
→ 期限到来の利札＝現金あつかい（資産↑）／40は国債の利息だから有価証券利息（収益）。
覚え方：「期限が来た券＝すぐ換金OK＝現金」。相手は利息なので有価証券利息。

### 小切手：現金 or 当座預金？（迷いやすい）

見分けの核＝**誰が振り出した小切手か**。

| 場面 | 科目 |
|---|---|
| 他人（相手）振出の小切手を 受け取る／持つ／渡す | **現金**（すぐ換金できる券） |
| 自分（自己）が小切手を振り出して払う | **当座預金**（自分の当座から出る） |
| 自己振出の小切手が自分に戻ってきた | **当座預金**（自分のが戻る） |

例：
- 他人振出小切手を受け取り完成工事未収入金を回収 →（借）現金 ／（貸）完成工事未収入金
- 持ってた他人振出小切手で工事未払金を払う →（借）工事未払金 ／（貸）現金
- 自分で小切手を振り出して工事未払金を払う →（借）工事未払金 ／（貸）当座預金

覚え方：**他人の小切手＝現金／自分の小切手＝当座預金**。

## 銀行勘定調整表まわり（当座預金）

### 当座借越（二勘定制）

当座預金の残高**以上**に小切手を振り出すと、銀行が足りない分を立て替える（＝短期の借入）。
その立て替え分＝**当座借越（負債）**。当座預金（資産）と当座借越（負債）を分けて使う＝二勘定制。

- **残高を超えて払ったとき** … 残高分は当座預金、超過分は当座借越（負債）へ
- **借越がある状態で入金したとき** … まず当座借越を返してから、残りが当座預金

例：当座預金残高100のとき、工事未払金150を小切手で払う → その後、現金250を預け入れ
```
① （借）工事未払金 150 ／（貸）当座預金 100・当座借越 50
② （借）当座借越 50・当座預金 200 ／（貸）現金 250
```
覚え方：**借越（借金）がある時に入金したら、まず借越を返す → 残りが当座預金**。

### 未渡小切手（みわたしこぎって）

小切手を**振り出したが、まだ相手に渡していない**もの。
振り出した時点で帳簿上は当座預金を減らしてある → 渡してない＝お金はまだ出ていない → **当座預金を戻す**仕訳が必要（「仕訳なし」ではない！）。

相手科目は「何の支払い用だったか」で変わる：
- **債務（工事未払金・買掛金）の支払い分** → その債務を**復活**
- **費用（広告費など）の支払い分** → 費用は戻さず **未払金**（費用は発生済みだから）

例：
```
(債務用) （借）当座預金 5,000 ／（貸）工事未払金 5,000
(費用用) （借）当座預金 4,000 ／（貸）未払金 4,000
```
覚え方：「作った時に当座を減らしてる → 渡してないから戻す」。戻す相手は **債務なら債務復活／費用なら未払金**。

---

**銀行勘定調整表とは**
帳簿の当座預金残高と、銀行の残高証明書の金額がズレたとき、その原因を並べて
両方を正しい残高にそろえる表。ズレの原因は「時間差」か「連絡ミス・記入ミス」。

**判定ルール（これだけ覚える）**
- 「銀行が遅れてる／まだ処理してない」→ **銀行側**を調整（**仕訳は不要**）
- 「自分が知らなかった／書き間違えた」→ **企業側（帳簿）**を調整（**仕訳が必要**）

| 用語 | 意味 | 調整する側 | 仕訳 |
|---|---|---|---|
| 未取付小切手 | 振り出したが、相手がまだ銀行に持ち込んでいない | 銀行側・減算 | 不要 |
| 時間外預入 | 夜間金庫などで預けたが、銀行の入金処理は翌日 | 銀行側・加算 | 不要 |
| 未取立小切手（未取立為替手形） | 銀行に預けたが、銀行がまだ取り立てていない | 銀行側・加算 | 不要 |
| 連絡未通知（入金） | 得意先の振込などを銀行は処理済、当社が知らなかった | 企業側・加算 | 必要 |
| 連絡未通知（引落） | 自動引落などを銀行は処理済、当社が知らなかった | 企業側・減算 | 必要 |
| 誤記入 | 当社の記帳ミス（金額違いなど） | 企業側 | 必要 |

**なぜ企業側だけ仕訳するの?**
銀行側のズレ（未取付・時間外など）は、銀行がそのうち自分で処理する。当社の帳簿はもう正しい → 仕訳不要。
企業側のズレは、当社の帳簿が未記入・間違い → 仕訳で直す必要がある。

**両者区分調整法**
企業側・銀行側の両方を調整して、同じ「正しい残高」に一致させる方法（2級の主流）。

## 仕入・売上まわり（3章）

| 用語 | 意味 | 区分 |
|---|---|---|
| 前渡金（まえわたしきん） | 材料や外注などに、モノを受け取る前に**先に払った**お金（＝前払金） | 資産（BS） |
| 材料 | 購入して**保管中**の材料。工事で使ったら未成工事支出金へ振り替える | 資産（BS） |
| 工事未払金 | 工事関連の未払い（＝買掛金） | 負債（BS） |

### 値引き・割戻し・割引の3兄弟（混同注意！）

| 用語 | どんなとき？ | 性格 |
|---|---|---|
| **値引き** | 品質不良・キズなどで**代金をまけてもらう/まける** | 売上・仕入の**減額** |
| **割戻し**（リベート） | **大量に取引したお礼**として代金を戻す/戻される | 売上・仕入の**減額** |
| **仕入割引** | 買掛金を**早く払った**ことで受ける割引（利息の性格） | **営業外収益**（PL） |
| **売上割引** | 売掛金を**早く払ってもらう**ため与える割引（利息の性格） | **営業外費用**（PL） |

**見分けの核**
- 値引き＝品質の問題／割戻し＝量のお礼 → どちらも「売上・仕入そのものを減らす」
- 割引＝**早払いの利息**のイメージ → 売上・仕入とは別枠の「営業外」に入る
- 仕入割引＝もらえる＝**収益** ／ 売上割引＝あげる＝**費用**

### 仕入諸掛（引取運賃など）

材料を買うときにかかる本体以外の費用（**引取運賃**・手数料・保険料など）＝仕入諸掛。
**当社負担の引取運賃などは、材料の原価に含める**（別の費用科目にしない）。

例：工事用材料 ¥500 を掛けで購入し、引取運賃 ¥30 を現金で支払った
```
（借）未成工事支出金 530 ／（貸）工事未払金 500・現金 30
```
→ 材料500＋運賃30＝530が材料の原価（未成工事支出金）に入る。

**方向で見分け**：
- 引取運賃（買う時・入ってくる）→ 原価に**含める**（未成工事支出金/材料）
- 発送費（売る時・出ていく・当社負担）→ **費用**（荷造運賃など）

## 手形まわり（4章）

### 基本
| 用語 | 意味 | 区分 |
|---|---|---|
| 受取手形 | 手形を受け取った（あとで代金をもらえる権利） | 資産（BS） |
| 支払手形 | 手形を振り出した（あとで代金を払う義務） | 負債（BS） |

#### 支払うとき、どっちの手形？（見分け）

- 手形を**振り出して**払う（新しく発行）→ **支払手形**（負債が増える）
- 持っている**受取手形を裏書譲渡して**払う → **受取手形**（資産が減る）
- 「支払う」でも、"新規発行"か"持ってる手形を渡す"かで科目が変わる。
  **キーワードは「裏書譲渡して」**＝持ってる受取手形を渡した、の合図。"支払う"に引っぱられず、**何を動かしたか**を見る。

### 手形の全体マップ

「**何のための手形か × 受け取る/払う側**」で整理。

| 何のための手形？ | 受け取る／貸す側（資産） | 払う／借りる側（負債） |
|---|---|---|
| 本業（工事などの売買） | 受取手形 | 支払手形 |
| 本業以外（固定資産の売買など） | 営業外受取手形 | 営業外支払手形 |
| お金の貸し借り | 手形貸付金 | 手形借入金 |

＋特殊：**不渡手形**（資産・不渡りになった手形の振替先）／**裏書手形・割引手形**（評価勘定）

**誰が振り出す（発行する）？**
- 大原則（約束手形）：振り出すのは **払う側／借りる側**（お金を出す義務がある人）。
  - 負債側（支払手形・営業外支払手形・手形借入金）→ **自分が振り出す**
  - 資産側（受取手形・営業外受取手形・手形貸付金）→ **相手が振り出す**（自分は受け取る）
- 例外：**為替手形** → 振り出すのは **振出人（指図人）** で、その人は払わない（払うのは名宛人）。

**読み解き2軸**：①受け取る/払う（資産/負債）× ②本業/本業外/貸借。

### 自己振出手形＝「肩たたき券」のイメージ

支払手形は、**自分が書いた肩たたき券**（＝自分の義務）。持っている人は、あなたに"肩たたき"を請求できる。

- **振り出したとき** → 肩たたき券を発行 ＝ 義務が**生まれる** → （貸）支払手形
- **自分に戻ってきたとき（回収）** → 自分の義務が**消える** → （借）支払手形
  - ※ふつう手形をもらったら「受取手形（資産）」だが、**自己振出のものは受取手形にしない**。自分の負債（支払手形）を消す。

```
振出： （借）工事未払金 100,000 ／（貸）支払手形 100,000   ← 支払手形が誕生
回収： （借）支払手形 100,000 ／（貸）完成工事未収入金 100,000 ← 支払手形が消滅
```

**違和感ポイントの答え**：振出と回収は「1取引の逆」ではなく**別々の2取引**。
鏡になるのは**支払手形だけ**（誕生＝貸方／消滅＝借方）。相手科目は取引ごとに相手・理由が違うので、別物でOK。

### 為替手形（3人が登場する手形）

約束手形は2人（振出人・受取人）だが、**為替手形は3人**。
ひと言：「**AがBに『Cに払っといて』と指示する**」手形。

| 登場人物 | 役割 | 記録する手形科目 |
|---|---|---|
| 振出人（A） | 手形を作って指示する人 | **なし**（買掛金/売掛金だけ動く）★ヒッカケ |
| 名宛人（B）＝支払人 | 「払え」と名指しされた人。承諾＝引き受け | **支払手形**（負債） |
| 受取人（C） | お金をもらう人 | **受取手形**（資産） |

**引き受け** … 名宛人（B）が「払います」と承諾すること。承諾した瞬間に支払義務が確定 → 支払手形を計上。

例：A社がB社を名宛人、C社を受取人とする為替手形 ¥100,000 を振り出し、B社が引き受けた。
```
振出人A： （借）買掛金 100,000 ／（貸）売掛金 100,000   ← 手形科目を使わない！
名宛人B： （借）買掛金 100,000 ／（貸）支払手形 100,000  ← 引き受け＝支払義務
受取人C： （借）受取手形 100,000 ／（貸）売掛金 100,000
```
**核**：手形を持つのは名宛人（支払手形）と受取人（受取手形）だけ。振出人は指示するだけで手形科目なし。

### 自己振出の「小切手」と「手形」の対比

| | 通常（他人振出）を受け取る | 自己振出が戻ってくる |
|---|---|---|
| 小切手 | 現金（資産） | **当座預金**が戻る |
| 手形 | 受取手形（資産） | **支払手形**（負債）が消える |

→ 共通ルール：**自分が振り出したものが戻ったら「振り出したときの逆」**。小切手は当座預金を巻き戻し、手形は支払手形を巻き戻す。

### 手形の割引・裏書（手形売却損・保証債務）

**手形の割引**：受取手形を満期前に銀行へ持ち込んで現金化すること。差し引かれる料金＝**手形売却損**（費用・営業外費用）。
※この「割引」は、売上割引/仕入割引（早払いの値引き）とは別物。手形を早く現金化するコスト。

```
例：受取手形 ¥100,000 を割り引き、割引料 ¥1,500 を引かれ残額を当座で受取
（借）当座預金 98,500・手形売却損 1,500 ／（貸）受取手形 100,000
```

**手形の裏書**：受取手形を、他人への支払いに回す（譲渡する）こと。

#### 保証債務・偶発債務（割引・裏書とセット）

手形を割引/裏書しても、「もし不渡りになったら自分が払う」義務が残る。これを記録する。

| 用語 | 意味 | 区分 |
|---|---|---|
| 偶発債務 | 将来の出来事しだいで発生する"かもしれない"債務（連帯保証人のイメージ） | ― |
| 保証債務 | その"もしも"を記録する負債。割引/裏書時に計上 | 負債 |
| 保証債務費用 | 保証債務を立てるときの相手科目 | 費用 |
| 保証債務取崩益 | 手形が無事決済され、もしもが消えたときの収益 | 収益 |

```
① 割引時：   （借）当座預金・手形売却損 ／（貸）受取手形
② 偶発債務： （借）保証債務費用 ／（貸）保証債務      ← もしもを記録
③ 無事決済： （借）保証債務 ／（貸）保証債務取崩益     ← もしもが消える
```
※もし不渡りになったら、保証債務を取り崩して実際に支払う処理になる。

## 経過勘定（前払・前受・未払・未収）（第6章）

**大原則：お金の受け渡しは"済み"か"まだ"か**
- **済み ＋ 来期分 → 繰り延べ（前払・前受）**
- **まだ ＋ 今期分 → 見越し（未払・未収）**

| 種類 | 区分 | いつ？ | 例 |
|---|---|---|---|
| 前払費用 | 資産 | 先に払った・来期分 | 前払家賃・前払保険料 |
| 前受収益 | 負債 | 先にもらった・来期分 | 前受利息・前受地代 |
| 未払費用 | 負債 | 今期発生・まだ払ってない | 未払利息・未払保険料 |
| 未収収益 | 資産 | 今期発生・まだもらってない | 未収地代・未収利息 |

**覚え方**：**前**＝先に受け渡し済み（繰り延べ）／**未**＝まだ（見越し）。
費用側（払う）＝前払・未払、収益側（もらう）＝前受・未収。

**仕訳の型**：
```
前払費用：（借）前払◯◯ ／（貸）支払◯◯   （費用を減らす）
前受収益：（借）受取◯◯ ／（貸）前受◯◯   （収益を減らす）
未払費用：（借）支払◯◯ ／（貸）未払◯◯   （費用を増やす）
未収収益：（借）未収◯◯ ／（貸）受取◯◯   （収益を増やす）
```
※後払いの利息 → 未払利息（見越し）／先払いの家賃の来期分 → 前払家賃（繰り延べ）。

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<script>
"use strict";
const MD = document.getElementById("mdsrc").textContent;
const content = document.getElementById("content");

function build(){
  content.innerHTML = marked.parse(MD);
  const h2s = content.querySelectorAll("h2");
  let toc = '<div class="tt">目次（タップで移動）</div>';
  h2s.forEach((h,i)=>{ h.id="sec-"+i; toc += `<a href="#sec-${i}">${h.textContent}</a>`; });
  document.getElementById("toc").innerHTML = toc;
}

function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

function search(){
  const q = document.getElementById("q").value.trim();
  build(); // reset
  const hits = document.getElementById("hits");
  if(!q){ hits.textContent=""; return; }
  const re = new RegExp(esc(q),"gi");
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null);
  const nodes=[]; let node;
  while(node = walker.nextNode()){ if(node.nodeValue.trim()) nodes.push(node); }
  let count=0, first=null;
  nodes.forEach(n=>{
    if(!re.test(n.nodeValue)) return;
    re.lastIndex=0;
    const span=document.createElement("span");
    span.innerHTML = n.nodeValue.replace(re, m=>{ count++; return `<mark>${m}</mark>`; });
    n.parentNode.replaceChild(span, n);
    if(!first) first=span.querySelector("mark");
  });
  hits.textContent = count ? `「${q}」 ${count}件` : `「${q}」 見つかりません`;
  if(first) first.scrollIntoView({block:"center"});
}

document.getElementById("q").addEventListener("input", ()=>{ clearTimeout(window._t); window._t=setTimeout(search,250); });
document.getElementById("clr").addEventListener("click", ()=>{ document.getElementById("q").value=""; search(); document.getElementById("q").focus(); });
document.getElementById("toTop").addEventListener("click", ()=> window.scrollTo({top:0,behavior:"smooth"}));

build();
</script>
</body>
</html>

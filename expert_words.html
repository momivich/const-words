# Part 1｜建設業 × 簿記3級 対比表

建設業の科目は「3級の科目の**言い換え**」。本業が"工事"だから、売上・仕入まわりに「完成工事／未成工事／工事」が付くだけ。それ以外は3級と同じ。

## ① 名前が変わる科目（ここだけ覚えれば9割OK）

### 資産（BS・左）
| 建設業の科目 | 簿記3級 | 意味 |
|---|---|---|
| 完成工事未収入金 | 売掛金 | 完成した工事の、まだ回収してない代金 |
| 未成工事支出金 | 仕掛品 | 工事中にかかったお金の"プール"。完成で原価へ |
| 材料貯蔵品 | 貯蔵品 | 保管中の材料ストック |

### 負債（BS・右）
| 建設業の科目 | 簿記3級 | 意味 |
|---|---|---|
| 工事未払金 | 買掛金 | 工事関連の、まだ払ってない代金 |
| 未成工事受入金 | 前受金 | 先にもらった手付金 |

### 収益・費用（PL）
| 建設業の科目 | 簿記3級 | 意味 |
|---|---|---|
| 完成工事高 | 売上 | 工事が完成した分の売上 |
| 完成工事原価 | 売上原価 | 完成した工事にかかった原価 |

## ② 覚え方の3ルール

- **「完成工事」がつく → 本業の売上系**（完成工事高・完成工事原価・完成工事未収入金）
- **「未成工事」がつく → 工事中**（未成工事支出金＝仕掛品／未成工事受入金＝前受金）
- **「工事」だけ → 本業関連の債務**（工事未払金＝買掛金）

## ③ 3級のまま変わらない主な科目

現金／当座預金／普通預金／受取手形・支払手形／**前渡金（前払金）**／未払金・未収入金／貸付金・借入金／資本金／給料 など
→ 変わるのは「工事の売上・仕入まわり」だけ。それ以外は3級のままでOK。

## ④ 相手の呼び名も"自社視点"

| 呼び名 | 意味 | 科目 |
|---|---|---|
| 仕入先 | 自分が**買う**相手 | 工事未払金（買掛金） |
| 得意先 | 自分が**売る**相手 | 完成工事未収入金（売掛金） |

## ⑤ 仕訳の左右の裏ワザ

- 資産・費用 … 増えたら「左（借方）」
- 負債・純資産・収益 … 増えたら「右（貸方）」

## ⑥ よくある勘違い

**未成工事支出金 ＝「仕入」ではなく「仕掛品（貯金箱）」**
工事中にかかったお金をためる貯金箱（資産）。完成で箱を空にして「完成工事原価（費用）」へ。費用になるのは"完成したとき"。
```
[工事中] （借）未成工事支出金 ／（貸）工事未払金 など
[完成]   （借）完成工事原価   ／（貸）未成工事支出金
```

**収益と費用は別々に記録。売上を原価で減らさない**
```
売った側 ：（借）完成工事未収入金 800,000 ／（貸）完成工事高 800,000
かかった側：（借）完成工事原価   600,000 ／（貸）未成工事支出金 600,000
→ 儲け 200,000 はPLが計算する
```

## ⑦ 30秒セルフチェック

# Part 2｜章別 新出用語集

## 現金・当座預金（第2章）

### 現金として扱うもの（通貨代用証券）
すぐお金に換えられる券も「現金」で処理：他人振出の小切手／送金小切手・郵便為替証書／配当金領収証／**期限到来後の公社債利札**。
**有価証券利息（収益）**＝国債・社債の利息。例：利札¥40期限到来 →（借）現金40／（貸）有価証券利息40

### 小切手：現金 or 当座預金？
| 場面 | 科目 |
|---|---|
| 他人振出の小切手を 受け取る／持つ／渡す | **現金** |
| 自分が小切手を振り出す／自己振出が戻る | **当座預金** |

覚え方：**他人の小切手＝現金／自分の小切手＝当座預金**。

### 当座借越（二勘定制）
残高以上に振り出すと銀行が立替＝**当座借越（負債）**。借越がある状態で入金したら、まず借越を返す→残りが当座預金。
```
① （借）工事未払金 150 ／（貸）当座預金 100・当座借越 50
② （借）当座借越 50・当座預金 200 ／（貸）現金 250
```

### 未渡小切手
振り出したがまだ渡してない → **当座預金を戻す**（仕訳なしではない）。
- 債務の支払い分 →（借）当座預金／（貸）工事未払金（債務復活）
- 費用の支払い分 →（借）当座預金／（貸）未払金

### 銀行勘定調整表
**大原則：銀行が遅れてる→銀行側（仕訳不要）／自分が知らない・間違えた→企業側（仕訳必要）**
| 用語 | 調整する側 | 仕訳 |
|---|---|---|
| 未取付小切手 | 銀行側・減算 | 不要 |
| 時間外預入 | 銀行側・加算 | 不要 |
| 未取立小切手 | 銀行側・加算 | 不要 |
| 連絡未通知 | 企業側 | 必要 |
| 誤記入 | 企業側 | 必要 |

## 仕入・売上（第3章）

| 用語 | 意味 | 区分 |
|---|---|---|
| 前渡金 | 先に払ったお金（前払金） | 資産 |
| 材料 | 保管中の材料（使ったら未成工事支出金へ） | 資産 |
| 工事未払金 | 工事関連の未払い（買掛金） | 負債 |

### 値引き・割戻し・割引の3兄弟
| 用語 | どんなとき | 性格 |
|---|---|---|
| 値引き | 品質不良・キズ | 売上・仕入の減額 |
| 割戻し | 大量取引のお礼 | 売上・仕入の減額 |
| 仕入割引 | 買掛金を早く払って受ける | **営業外収益** |
| 売上割引 | 売掛金を早く払ってもらうため与える | **営業外費用** |

値引き＝品質／割戻し＝量（どちらも減額）／割引＝早払いの利息（営業外）。

### 仕入諸掛（引取運賃）
当社負担の引取運賃は**材料の原価に含める**。例：材料500・運賃30 →（借）未成工事支出金 530 ／（貸）工事未払金500・現金30。
引取運賃（買う時）→原価／発送費（売る時）→費用。

## 手形（第4章）

### 基本
| 用語 | 意味 | 区分 |
|---|---|---|
| 受取手形 | もらった手形 | 資産 |
| 支払手形 | 振り出した手形 | 負債 |

**支払うとき**：振り出して払う→支払手形（負債↑）／受取手形を裏書譲渡→受取手形（資産↓）。「裏書譲渡して」がキーワード。

### 手形の全体マップ
| 目的 | 受け取る／貸す側（資産） | 払う／借りる側（負債） |
|---|---|---|
| 本業の売買 | 受取手形 | 支払手形 |
| 本業以外 | 営業外受取手形 | 営業外支払手形 |
| お金の貸し借り | 手形貸付金 | 手形借入金 |

＋特殊：不渡手形（資産）／裏書手形・割引手形（評価勘定）。
**誰が振り出す？** 約束手形は払う側／借りる側。為替手形だけ振出人（払わない指図人）。

### 自己振出手形＝肩たたき券
振出＝支払手形が生まれる／回収＝支払手形が消える（受取手形にしない）。
```
振出： （借）工事未払金 100,000 ／（貸）支払手形 100,000
回収： （借）支払手形 100,000 ／（貸）完成工事未収入金 100,000
```

### 為替手形（3人）
「AがBに『Cに払って』と指示」。
| 人物 | 手形科目 |
|---|---|
| 振出人A | **なし**（買掛金/売掛金だけ）★ヒッカケ |
| 名宛人B（引き受け） | 支払手形 |
| 受取人C | 受取手形 |

### 手形の割引・裏書（手形売却損・保証債務）
- 割引：受取手形を満期前に現金化。手数料＝**手形売却損（費用）**。（借）当座預金・手形売却損／（貸）受取手形
- 保証債務（割引/裏書で残る「もし不渡りなら払う」リスク）
```
① 割引：（借）当座預金・手形売却損 ／（貸）受取手形
② 備え：（借）保証債務費用 ／（貸）保証債務
③ 決済：（借）保証債務 ／（貸）保証債務取崩益
```

## 経過勘定（前払・前受・未払・未収）（第6章）

**大原則：受け渡し済み＋来期分→繰り延べ（前払・前受）／まだ＋今期分→見越し（未払・未収）**
| 種類 | 区分 | いつ | 例 |
|---|---|---|---|
| 前払費用 | 資産 | 先に払った・来期分 | 前払家賃 |
| 前受収益 | 負債 | 先にもらった・来期分 | 前受利息 |
| 未払費用 | 負債 | 今期発生・未払い | 未払利息 |
| 未収収益 | 資産 | 今期発生・未収 | 未収地代 |

覚え方：**前**＝先に受け渡し済み／**未**＝まだ。後払い利息→未払利息（見越し）。

## 有価証券（第7章）

### 4つの保有目的（分類）
| 分類 | 評価 | BS区分 |
|---|---|---|
| 売買目的有価証券 | 時価評価 | 流動（有価証券） |
| 満期保有目的債券 | 償却原価法 | 1年基準で流動/固定 |
| 子会社・関連会社株式 | 取得原価のまま | 固定（投資有価証券） |
| その他有価証券 | 時価評価 | 固定（投資有価証券） |

表示：流動＝**有価証券**／固定＝**投資有価証券**。

### 満期保有目的債券の1年基準
満期まで1年超→投資有価証券（固定）／1年以内→有価証券（流動）に振替。5年債なら実質最後の1年が流動。

### 処理・損益科目
評価替え→有価証券評価益/損／償却原価法→金利調整差額を有価証券利息へ／端数利息／減損（強制評価減・実価法）。
損益：有価証券利息（債券）／受取配当金（株式）／有価証券売却益・損。

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<script>
"use strict";
const MD = document.getElementById("mdsrc").textContent;
const content = document.getElementById("content");

function build(){
  content.innerHTML = marked.parse(MD);
  const hs = content.querySelectorAll("h1, h2");
  let toc = '<div class="tt">目次（タップで移動）</div>';
  hs.forEach((h,i)=>{ h.id="sec-"+i; const p=h.tagName==="H1"?"■ ":""; toc += `<a href="#sec-${i}">${p}${h.textContent}</a>`; });
  document.getElementById("toc").innerHTML = toc;
}
function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
function search(){
  const q = document.getElementById("q").value.trim();
  build();
  const hits = document.getElementById("hits");
  if(!q){ hits.textContent=""; return; }
  const re = new RegExp(esc(q),"gi");
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null);
  const nodes=[]; let node;
  while(node = walker.nextNode()){ if(node.nodeValue.trim()) nodes.push(node); }
  let count=0, first=null;
  nodes.forEach(n=>{
    if(!re.test(n.nodeValue)) return;
    re.lastIndex=0;
    const span=document.createElement("span");
    span.innerHTML = n.nodeValue.replace(re, m=>{ count++; return `<mark>${m}</mark>`; });
    n.parentNode.replaceChild(span, n);
    if(!first) first=span.querySelector("mark");
  });
  hits.textContent = count ? `「${q}」 ${count}件` : `「${q}」 見つかりません`;
  if(first) first.scrollIntoView({block:"center"});
}
document.getElementById("q").addEventListener("input", ()=>{ clearTimeout(window._t); window._t=setTimeout(search,250); });
document.getElementById("clr").addEventListener("click", ()=>{ document.getElementById("q").value=""; search(); document.getElementById("q").focus(); });
document.getElementById("toTop").addEventListener("click", ()=> window.scrollTo({top:0,behavior:"smooth"}));
build();
</script>
